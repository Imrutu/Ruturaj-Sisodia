<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Ruturaj Sinh Sisodia | DevOps Engineer</title>
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Fira+Mono:wght@400;700&display=swap" rel="stylesheet">
  <!-- Font Awesome -->
  <script src="https://kit.fontawesome.com/6e2e5e2e2e.js" crossorigin="anonymous"></script>
  <style>
    :root {
      --bg: #0a0e1a;
      --bg-glass: rgba(20,24,40,0.7);
      --glass-blur: 18px;
      --primary: #7f5af0;
      --primary-neon: #00eaff;
      --accent: #00eaff;
      --gradient: linear-gradient(100deg, #7f5af0 0%, #00eaff 100%);
      --gradient-rev: linear-gradient(100deg, #00eaff 0%, #7f5af0 100%);
      --text: #f1f1f1;
      --text-muted: #b0b8d1;
      --card-bg: rgba(30,34,54,0.6);
      --card-border: rgba(127,90,240,0.18);
      --shadow: 0 8px 32px 0 rgba(0,0,0,0.25);
      --radius: 22px;
      --transition: 0.35s cubic-bezier(.4,0,.2,1);
      --ripple: rgba(0,234,255,0.18);
      --navbar-height: 70px;
    }
    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', 'Fira Mono', Arial, sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
    }
    /* Particles BG */
    #particles-bg {
      position: fixed;
      z-index: 0;
      top: 0; left: 0; width: 100vw; height: 100vh;
      pointer-events: none;
    }
    /* Navbar */
    nav {
      position: sticky;
      top: 0;
      z-index: 100;
      height: var(--navbar-height);
      background: rgba(10,14,26,0.85);
      backdrop-filter: blur(12px);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 2.5rem;
      box-shadow: 0 2px 16px 0 rgba(0,234,255,0.04);
      border-bottom: 1.5px solid rgba(127,90,240,0.08);
      transition: background var(--transition);
    }
    .nav-logo {
      font-size: 1.5rem;
      font-weight: 800;
      letter-spacing: 1.5px;
      background: var(--gradient);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .nav-links {
      display: flex;
      gap: 2.2rem;
      list-style: none;
      margin: 0;
      padding: 0;
    }
    .nav-links a {
      color: var(--text);
      text-decoration: none;
      font-weight: 600;
      font-size: 1.05rem;
      position: relative;
      padding: 0.3rem 0.2rem;
      transition: color var(--transition);
    }
    .nav-links a::after {
      content: '';
      display: block;
      width: 0;
      height: 2.5px;
      background: var(--gradient);
      border-radius: 2px;
      transition: width var(--transition);
      position: absolute;
      left: 0; bottom: -4px;
    }
    .nav-links a.active, .nav-links a:hover {
      color: var(--accent);
    }
    .nav-links a.active::after, .nav-links a:hover::after {
      width: 100%;
    }
    .nav-toggle {
      display: none;
      font-size: 2rem;
      color: var(--primary);
      cursor: pointer;
    }
    /* Hero */
    .hero {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      position: relative;
      z-index: 1;
      padding: 0 1.5rem;
    }
    .hero-title {
      font-size: 2.8rem;
      font-weight: 800;
      letter-spacing: 2px;
      margin-bottom: 0.7rem;
      background: var(--gradient);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: fadeInDown 1.1s;
    }
    .hero-role {
      font-size: 1.3rem;
      font-weight: 600;
      color: var(--text-muted);
      margin-bottom: 1.2rem;
      letter-spacing: 1px;
      animation: fadeInDown 1.3s;
    }
    .hero-typing {
      font-family: 'Fira Mono', monospace;
      font-size: 1.1rem;
      color: var(--accent);
      min-height: 1.5em;
      margin-bottom: 2.2rem;
      animation: fadeIn 1.5s;
    }
    .hero-cta {
      display: flex;
      gap: 1.2rem;
      justify-content: center;
      margin-bottom: 1.5rem;
      animation: fadeInUp 1.7s;
    }
    .btn {
      position: relative;
      padding: 0.95rem 2.2rem;
      border-radius: 100px;
      border: none;
      font-size: 1.08rem;
      font-weight: 700;
      background: var(--gradient);
      color: var(--bg);
      box-shadow: 0 4px 24px 0 rgba(0,234,255,0.13);
      cursor: pointer;
      overflow: hidden;
      transition: transform var(--transition), box-shadow var(--transition);
      outline: none;
      z-index: 1;
    }
    .btn:active { transform: scale(0.97);}
    .btn.secondary {
      background: var(--bg-glass);
      color: var(--accent);
      border: 1.5px solid var(--accent);
      box-shadow: 0 4px 24px 0 rgba(127,90,240,0.10);
    }
    .btn .fa { margin-right: 0.7rem; }
    .btn:hover, .btn:focus {
      box-shadow: 0 8px 32px 0 rgba(127,90,240,0.18), 0 0 16px 2px var(--primary-neon);
      transform: translateY(-2px) scale(1.04);
    }
    .btn:after {
      content: '';
      position: absolute;
      left: 50%; top: 50%;
      transform: translate(-50%,-50%) scale(0);
      width: 200%;
      height: 200%;
      background: var(--ripple);
      border-radius: 50%;
      z-index: 0;
      transition: transform 0.5s, opacity 0.5s;
      opacity: 0;
      pointer-events: none;
    }
    .btn.ripple:after {
      transform: translate(-50%,-50%) scale(1);
      opacity: 1;
      transition: transform 0.5s, opacity 0.5s;
    }
    /* Section */
    section {
      max-width: 1100px;
      margin: 0 auto;
      padding: 4.5rem 1.5rem 2.5rem 1.5rem;
      position: relative;
      z-index: 1;
    }
    section h2 {
      font-size: 2.1rem;
      font-weight: 800;
      background: var(--gradient);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 2.2rem;
      text-align: center;
      letter-spacing: 1.5px;
    }
    /* Glass Card */
    .glass-card {
      background: var(--card-bg);
      border: 1.5px solid var(--card-border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      backdrop-filter: blur(var(--glass-blur));
      -webkit-backdrop-filter: blur(var(--glass-blur));
      padding: 2.2rem 2.5rem;
      margin-bottom: 2.5rem;
      transition: transform var(--transition), box-shadow var(--transition);
      position: relative;
      overflow: hidden;
    }
    .glass-card:hover {
      transform: translateY(-8px) scale(1.025);
      box-shadow: 0 12px 48px 0 rgba(127,90,240,0.18), 0 0 24px 2px var(--primary-neon);
    }
    /* About */
    .about-content {
      font-size: 1.15rem;
      color: var(--text);
      text-align: center;
      line-height: 1.8;
    }
    /* Skills */
    .skills-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 1.1rem;
      justify-content: center;
      margin-bottom: 2rem;
    }
    .skill-tag {
      background: var(--gradient-rev);
      color: var(--bg);
      font-weight: 700;
      font-size: 1.05rem;
      border-radius: 100px;
      padding: 0.7rem 1.5rem;
      box-shadow: 0 2px 12px 0 rgba(0,234,255,0.10);
      margin-bottom: 0.5rem;
      letter-spacing: 0.5px;
      transition: transform var(--transition), box-shadow var(--transition);
      cursor: pointer;
      position: relative;
      overflow: hidden;
    }
    .skill-tag:hover {
      transform: scale(1.08);
      box-shadow: 0 4px 24px 0 rgba(127,90,240,0.18), 0 0 12px 2px var(--primary-neon);
    }
    .skills-bars {
      max-width: 600px;
      margin: 2rem auto 0 auto;
    }
    .skill-bar {
      margin-bottom: 1.3rem;
    }
    .skill-bar-label {
      font-size: 1.02rem;
      color: var(--text-muted);
      margin-bottom: 0.3rem;
      font-weight: 600;
      letter-spacing: 0.5px;
    }
    .skill-bar-bg {
      background: rgba(127,90,240,0.13);
      border-radius: 100px;
      height: 13px;
      width: 100%;
      overflow: hidden;
      position: relative;
    }
    .skill-bar-fill {
      height: 100%;
      border-radius: 100px;
      background: var(--gradient);
      width: 0;
      transition: width 1.2s cubic-bezier(.4,0,.2,1);
      box-shadow: 0 0 8px 1px var(--primary-neon);
    }
    /* Experience Timeline */
    .timeline {
      position: relative;
      margin-left: 1.5rem;
      padding-left: 2.5rem;
      border-left: 3px solid var(--primary);
    }
    .timeline-item {
      position: relative;
      margin-bottom: 2.8rem;
      animation: fadeInUp 1.2s;
    }
    .timeline-dot {
      position: absolute;
      left: -2.2rem;
      top: 0.2rem;
      width: 1.3rem;
      height: 1.3rem;
      background: var(--primary-neon);
      border-radius: 50%;
      border: 3px solid var(--bg);
      box-shadow: 0 0 0 6px rgba(127,90,240,0.13);
    }
    .timeline-role {
      font-size: 1.13rem;
      font-weight: 700;
      color: var(--primary);
    }
    .timeline-company {
      font-size: 1.05rem;
      color: var(--accent);
      font-weight: 600;
    }
    .timeline-duration {
      font-size: 0.98rem;
      color: var(--text-muted);
      margin-bottom: 0.5rem;
    }
    .timeline-desc {
      color: var(--text);
      font-size: 1.01rem;
      margin-top: 0.2rem;
      line-height: 1.7;
    }
    /* Projects */
    .projects-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 2rem;
      justify-content: center;
      margin-bottom: 2rem;
    }
    .project-card {
      background: var(--card-bg);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      backdrop-filter: blur(var(--glass-blur));
      -webkit-backdrop-filter: blur(var(--glass-blur));
      padding: 2rem 2rem 1.5rem 2rem;
      min-width: 260px;
      max-width: 340px;
      flex: 1 1 260px;
      display: flex;
      flex-direction: column;
      gap: 0.7rem;
      border: 1.5px solid var(--card-border);
      transition: transform var(--transition), box-shadow var(--transition), border-color var(--transition);
      position: relative;
      overflow: hidden;
      cursor: pointer;
    }
    .project-card:hover {
      transform: translateY(-8px) scale(1.04);
      box-shadow: 0 12px 48px 0 rgba(127,90,240,0.18), 0 0 24px 2px var(--primary-neon);
      border-color: var(--accent);
    }
    .project-card i {
      font-size: 2rem;
      color: var(--primary-neon);
      margin-bottom: 0.5rem;
    }
    .project-title {
      font-size: 1.13rem;
      color: var(--primary);
      font-weight: 700;
    }
    .project-desc {
      color: var(--text-muted);
      font-size: 1.01rem;
    }
    /* Certifications */
    .certs-list {
      display: flex;
      flex-wrap: wrap;
      gap: 1.5rem;
      justify-content: center;
      margin-bottom: 2rem;
    }
    .cert-card {
      background: var(--card-bg);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 1.2rem 2rem;
      min-width: 200px;
      max-width: 250px;
      display: flex;
      align-items: center;
      gap: 1rem;
      border: 1.5px solid var(--card-border);
      transition: transform var(--transition), box-shadow var(--transition), border-color var(--transition);
      position: relative;
      overflow: hidden;
    }
    .cert-card:hover {
      transform: translateY(-4px) scale(1.03);
      box-shadow: 0 8px 32px 0 rgba(127,90,240,0.15);
      border-color: var(--accent);
    }
    .cert-card i {
      font-size: 2rem;
      color: var(--primary);
    }
    .cert-title {
      font-size: 1.05rem;
      color: var(--text);
      font-weight: 600;
    }
    /* Why Hire Me */
    .why-hire {
      background: var(--gradient);
      color: var(--bg);
      border-radius: var(--radius);
      box-shadow: 0 8px 32px 0 rgba(0,234,255,0.13);
      padding: 2.5rem 2rem;
      text-align: center;
      font-size: 1.25rem;
      font-weight: 700;
      margin-bottom: 2.5rem;
      letter-spacing: 0.5px;
      transition: transform var(--transition), box-shadow var(--transition);
      position: relative;
      overflow: hidden;
    }
    .why-hire:hover {
      transform: scale(1.02);
      box-shadow: 0 12px 48px 0 rgba(127,90,240,0.18), 0 0 24px 2px var(--primary-neon);
    }
    /* Contact */
    .contact-cards {
      display: flex;
      flex-wrap: wrap;
      gap: 2rem;
      justify-content: center;
      margin-bottom: 2rem;
    }
    .contact-card {
      background: var(--card-bg);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 1.2rem 2rem;
      min-width: 200px;
      max-width: 250px;
      display: flex;
      align-items: center;
      gap: 1rem;
      border: 1.5px solid var(--card-border);
      transition: transform var(--transition), box-shadow var(--transition), border-color var(--transition);
      color: var(--text);
      text-decoration: none;
      position: relative;
      overflow: hidden;
    }
    .contact-card:hover {
      transform: translateY(-4px) scale(1.03);
      box-shadow: 0 8px 32px 0 rgba(127,90,240,0.15);
      border-color: var(--accent);
      color: var(--accent);
    }
    .contact-card i {
      font-size: 1.7rem;
      color: var(--primary);
      transition: color var(--transition);
    }
    .contact-card:hover i {
      color: var(--accent);
    }
    .contact-label {
      font-size: 1.05rem;
      font-weight: 600;
    }
    /* Chat Bubble */
    .chat-bubble {
      position: fixed;
      bottom: 2.2rem;
      right: 2.2rem;
      z-index: 200;
      width: 68px;
      height: 68px;
      background: var(--gradient);
      border-radius: 50%;
      box-shadow: 0 8px 32px 0 rgba(0,234,255,0.18);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      animation: floatPulse 2.5s infinite;
      transition: box-shadow var(--transition), transform var(--transition);
      overflow: visible;
    }
    .chat-bubble:hover {
      box-shadow: 0 12px 48px 0 rgba(127,90,240,0.25), 0 0 24px 2px var(--primary-neon);
      transform: scale(1.08) translateY(-4px);
    }
    .chat-bubble i {
      color: var(--bg);
      font-size: 2rem;
      transition: color var(--transition);
    }
    @keyframes floatPulse {
      0%, 100% { transform: translateY(0) scale(1);}
      50% { transform: translateY(-10px) scale(1.08);}
    }
    .chat-bubble-message {
      position: absolute;
      right: 80px;
      bottom: 0;
      background: var(--card-bg);
      color: var(--text);
      border-radius: 16px;
      padding: 1.1rem 1.5rem;
      font-size: 1.05rem;
      box-shadow: 0 4px 24px 0 rgba(0,234,255,0.13);
      opacity: 0;
      pointer-events: none;
      transform: translateY(20px) scale(0.95);
      transition: opacity 0.5s, transform 0.5s;
      z-index: 201;
      min-width: 220px;
    }
    .chat-bubble-message.show {
      opacity: 1;
      pointer-events: auto;
      transform: translateY(0) scale(1);
    }
    .chat-bubble-expand {
      position: fixed;
      bottom: 2.2rem;
      right: 2.2rem;
      z-index: 210;
      width: 340px;
      max-width: 95vw;
      background: var(--card-bg);
      border-radius: 24px;
      box-shadow: 0 12px 48px 0 rgba(127,90,240,0.18), 0 0 24px 2px var(--primary-neon);
      padding: 2.2rem 2rem 1.5rem 2rem;
      display: none;
      flex-direction: column;
      align-items: flex-start;
      animation: springExpand 0.7s cubic-bezier(.22,1.61,.36,1) forwards;
      overflow: hidden;
    }
    @keyframes springExpand {
      0% { transform: scale(0.6) translateY(80px); opacity: 0;}
      60% { transform: scale(1.08) translateY(-10px); opacity: 1;}
      100% { transform: scale(1) translateY(0); opacity: 1;}
    }
    .chat-bubble-expand.show {
      display: flex;
    }
    .chat-bubble-expand-header {
      font-size: 1.2rem;
      font-weight: 700;
      color: var(--primary-neon);
      margin-bottom: 0.7rem;
      display: flex;
      align-items: center;
      gap: 0.7rem;
    }
    .chat-bubble-expand-body {
      color: var(--text);
      font-size: 1.05rem;
      margin-bottom: 1.2rem;
    }
    .chat-bubble-close {
      position: absolute;
      top: 1.1rem;
      right: 1.1rem;
      background: none;
      border: none;
      color: var(--accent);
      font-size: 1.3rem;
      cursor: pointer;
      transition: color var(--transition);
    }
    .chat-bubble-close:hover { color: var(--primary);}
    /* Footer */
    footer {
      text-align: center;
      color: var(--text-muted);
      font-size: 1rem;
      padding: 2rem 1rem 1rem 1rem;
      background: rgba(20,24,40,0.7);
      border-top: 1.5px solid var(--card-border);
      margin-top: 2rem;
      z-index: 1;
      position: relative;
    }
    /* Animations */
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(30px);}
      to { opacity: 1; transform: translateY(0);}
    }
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(40px);}
      to { opacity: 1; transform: translateY(0);}
    }
    @keyframes fadeInDown {
      from { opacity: 0; transform: translateY(-30px);}
      to { opacity: 1; transform: translateY(0);}
    }
    .reveal {
      opacity: 0;
      transform: translateY(40px);
      transition: opacity 0.8s cubic-bezier(.4,0,.2,1), transform 0.8s cubic-bezier(.4,0,.2,1);
    }
    .reveal.visible {
      opacity: 1;
      transform: translateY(0);
    }
    /* Responsive */
    @media (max-width: 900px) {
      .projects-grid, .certs-list, .contact-cards, .skills-tags {
        flex-direction: column;
        align-items: center;
      }
      section {
        padding: 3rem 1rem 1.5rem 1rem;
      }
      .glass-card, .why-hire {
        padding: 1.5rem 1rem;
      }
      .chat-bubble-expand {
        width: 98vw;
        right: 1vw;
        left: 1vw;
        padding: 1.2rem 0.7rem 1rem 0.7rem;
      }
    }
    @media (max-width: 600px) {
      nav {
        flex-direction: column;
        align-items: flex-start;
        padding: 0.7rem 1rem;
        height: auto;
      }
      .nav-links {
        flex-direction: column;
        gap: 1rem;
        width: 100%;
        display: none;
        background: rgba(20,24,40,0.97);
        margin-top: 0.7rem;
        border-radius: var(--radius);
        box-shadow: var(--shadow);
        padding: 1rem 0.5rem;
      }
      .nav-links.open {
        display: flex;
      }
      .nav-toggle {
        display: block;
        margin-left: auto;
      }
      .hero-title {
        font-size: 2rem;
      }
      .hero-role {
        font-size: 1rem;
      }
      section h2 {
        font-size: 1.3rem;
      }
      .glass-card, .project-card, .cert-card, .contact-card, .why-hire {
        padding: 1rem 1rem;
        min-width: unset;
        max-width: 100%;
      }
      .chat-bubble, .chat-bubble-expand {
        right: 1rem;
        bottom: 1rem;
      }
    }
  </style>
</head>
<body>
  <canvas id="particles-bg"></canvas>
  <!-- Navbar -->
  <div id="navbar"></div>
  <!-- Hero Section -->
  <div id="hero-section"></div>
  <!-- About -->
  <div id="about-section"></div>
  <!-- Education -->
  <div id="education-section"></div>
  <!-- Skills -->
  <div id="skills-section"></div>
  <!-- Experience -->
  <div id="experience-section"></div>
  <!-- Projects -->
  <div id="projects-section"></div>
  <!-- Certifications -->
  <div id="certifications-section"></div>
  <!-- Why Hire Me -->
  <div id="whyhire-section"></div>
  <!-- Contact -->
  <div id="contact-section"></div>
  <!-- Chat Bubble -->
  <div id="chatbubble-section"></div>
  <!-- Footer -->
  <div id="footer-section"></div>
  <script src="assets/main.js"></script>
  <script>
    // Simple loader for HTML partials
    function loadSection(id, file) {
      fetch(file)
        .then(res => res.text())
        .then(html => { document.getElementById(id).innerHTML = html; });
    }
    loadSection('navbar', 'sections/navbar.html');
    loadSection('hero-section', 'sections/hero.html');
    loadSection('about-section', 'sections/about.html');
    loadSection('education-section', 'sections/education.html');
    loadSection('skills-section', 'sections/skills.html');
    loadSection('experience-section', 'sections/experience.html');
    loadSection('projects-section', 'sections/projects.html');
    loadSection('certifications-section', 'sections/certifications.html');
    loadSection('whyhire-section', 'sections/whyhire.html');
    loadSection('contact-section', 'sections/contact.html');
    loadSection('chatbubble-section', 'sections/chatbubble.html');
    loadSection('footer-section', 'sections/footer.html');
  </script>
</body>
</html>
